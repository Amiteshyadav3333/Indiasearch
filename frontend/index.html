<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Indiasearch – AI Voice Search Engine</title>
    <link rel="stylesheet" href="style.css?v=3">
</head>

<body>

    <div class="container">

        <div class="header">
            <h1 class="logo">
                <span style="color:#ff4444">India</span><span style="color:#4285F4">Search</span>
            </h1>
            <div class="header-controls">
                <select id="languageSelect" class="language-select" title="Translate Results">
                    <option value="en">English (English)</option>
                    <option value="hi">Hindi (हिंदी)</option>
                    <option value="as">Assamese (असमिया)</option>
                    <option value="bn">Bengali (बंगाली)</option>
                    <option value="brx">Bodo (बोडो)</option>
                    <option value="doi">Dogri (डोगरी)</option>
                    <option value="gu">Gujarati (गुजराती)</option>
                    <option value="kn">Kannada (कन्नड़)</option>
                    <option value="ks">Kashmiri (कश्मीरी)</option>
                    <option value="gom">Konkani (कोंकणी)</option>
                    <option value="mai">Maithili (मैथिली)</option>
                    <option value="ml">Malayalam (मलयालम)</option>
                    <option value="mni">Manipuri (मणिपुरी)</option>
                    <option value="mr">Marathi (मराठी)</option>
                    <option value="ne">Nepali (नेपाली)</option>
                    <option value="or">Odia (उड़िया)</option>
                    <option value="pa">Punjabi (पंजाबी)</option>
                    <option value="sa">Sanskrit (संस्कृत)</option>
                    <option value="sat">Santhali (संथाली)</option>
                    <option value="sd">Sindhi (सिंधी)</option>
                    <option value="ta">Tamil (तमिल)</option>
                    <option value="te">Telugu (तेलुगु)</option>
                    <option value="ur">Urdu (उर्दू)</option>
                </select>
                <button onclick="toggleMode()" class="mode-btn" title="Dark Mode">🌙</button>
            </div>
        </div>

        <div class="search-box">
            <input id="searchInput" type="text" placeholder="Search anything…" autocomplete="off">
            <button onclick="toggleVoiceSearch()" id="micButton" class="mic-btn" title="Voice Search">🎙️</button>
            <button onclick="search(1, false)" class="search-btn">Search</button>
            <button onclick="search(1, true)" class="ai-btn" title="AI Overview">✨ Ask AI</button>
            <div id="autocompleteDropdown" class="autocomplete-dropdown" style="display: none;"></div>
        </div>

        <div id="searchFilters" class="search-filters" style="display: none;">
            <button class="filter-btn active" onclick="setFilter('all')">🔍 All</button>
            <button class="filter-btn" onclick="setFilter('news')">📰 News</button>
            <button class="filter-btn" onclick="setFilter('images')">🖼️ Images</button>
            <button class="filter-btn" onclick="setFilter('videos')">🎥 Videos</button>
        </div>

        <div id="searchHistory" class="history-container"></div>

        <div id="trendingContainer" class="trending-container">
            <h3>📈 Trending in India</h3>
            <div class="trending-grid">
                <!-- Populated by JS -->
            </div>
        </div>

        <div id="aiSummary" class="summary-container"></div>
        <div id="results" class="results"></div>
        <div class="pagination-container" id="pagination" style="display: none;"></div>

    </div>
    
    <!-- Image Zoom Modal -->
    <div id="imageModal" class="image-modal" style="display:none;" onclick="if(event.target === this) closeImageModal()">
        <div class="modal-header-actions">
            <span class="three-dot-menu" onclick="toggleDownloadMenu()">⋮</span>
            <div id="downloadMenu" class="download-menu" style="display:none;">
                <a id="downloadBtn" class="download-btn">📥 Download</a>
            </div>
            <span class="close-modal" onclick="closeImageModal()">&times;</span>
        </div>
        <img class="modal-content" id="zoomedImage">
    </div>

    <script src="app.js?v=3"></script>

</body>

</html>
