<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IndiaSearch – AI Voice Search Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=smart-filters-3">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <!-- Markdown Parser -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

  <!-- ═══ HEADER ═══ -->
  <header class="site-header" id="siteHeader">
    <div class="header-inner">
      <a href="#" class="brand" onclick="resetToHome()">
        <span class="brand-india">India</span><span class="brand-search">Search</span>
        <span class="brand-dot">.</span>
      </a>

      <div class="header-right">
        <select id="languageSelect" class="lang-select" title="Translate Results">
          <option value="en">🇮🇳 English</option>
          <option value="hi">हिंदी</option>
          <option value="as">অসমीया</option>
          <option value="bn">বাংলা</option>
          <option value="brx">Bodo</option>
          <option value="doi">Dogri</option>
          <option value="gu">ગુજરાતી</option>
          <option value="kn">ಕನ್ನಡ</option>
          <option value="ks">کشمیری</option>
          <option value="gom">Konkani</option>
          <option value="mai">Maithili</option>
          <option value="ml">മലയാളം</option>
          <option value="mni">Manipuri</option>
          <option value="mr">मराठी</option>
          <option value="ne">नेपाली</option>
          <option value="or">ଓଡ଼ିଆ</option>
          <option value="pa">ਪੰਜਾਬੀ</option>
          <option value="sa">संस्कृत</option>
          <option value="sat">Santhali</option>
          <option value="sd">سنڌي</option>
          <option value="ta">தமிழ்</option>
          <option value="te">తెలుగు</option>
          <option value="ur">اردو</option>
          <option value="bho">Bhojpuri</option>
        </select>

        <!-- User Hub -->
        <div class="user-action-hub">
          <button class="menu-dots-btn" id="userMenuBtn" onclick="toggleUserMenu()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="1" />
              <circle cx="12" cy="5" r="1" />
              <circle cx="12" cy="19" r="1" />
            </svg>
          </button>

          <div id="userDropdown" class="user-dropdown" style="display:none;">
            <!-- Content dynamically generated in JS based on auth state -->
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- ═══ HERO (HOME STATE) ═══ -->
  <main class="main-wrap">
    <section class="hero" id="heroSection">
      <div class="hero-logo">
        <span class="hl-india">India</span><span class="hl-search">Search</span>
      </div>
    </section>

    <!-- ═══ SEARCH SHELL ═══ -->
    <div class="search-shell" id="searchShell">
      <!-- Standard Mode -->
      <div class="search-box" id="searchBoxStandard">
        <span class="s-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
        </span>
        <input id="searchInput" type="text" placeholder="Kuch bhi search karo…" autocomplete="off" spellcheck="false">
        <div class="s-actions">
          <button onclick="toggleVoiceSearch()" id="micButton" class="icon-btn" title="Voice Search">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
              <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
              <line x1="12" y1="19" x2="12" y2="23" />
              <line x1="8" y1="23" x2="16" y2="23" />
            </svg>
          </button>
          <button onclick="startLiveScan()" id="cameraButtonStandard" class="icon-btn" title="Live Camera & Scanning">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
              <circle cx="12" cy="13" r="4" />
            </svg>
          </button>
          <div class="s-divider"></div>
          <button onclick="enterAiMode()" class="btn-ai-toggle" title="Switch to AI Mode">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
            </svg>
            Ask AI
          </button>
        </div>
      </div>

      <!-- AI Mode Box (Google Gemini Style) -->
      <div class="ai-mode-box" id="searchBoxAi" style="display:none;">
        <div class="ai-glow-bg"></div>
        <div id="aiPdfPreview" class="ai-pdf-preview" style="display:none;"></div>
        <div class="ai-input-wrap">
          <textarea id="aiSearchInput" placeholder="Puchho jo aapke mann mein hai... (AI Mode)" rows="1"
            oninput="autoExpand(this)"></textarea>
          <div class="ai-actions">
            <button onclick="openPdfPicker()" class="ai-mini-btn" title="PDF Analysis">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
              </svg>
            </button>
            <button onclick="startLiveScan()" class="ai-mini-btn" title="Visual Recognition">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                <circle cx="12" cy="13" r="4" />
              </svg>
            </button>
            <button class="ai-mini-btn" onclick="exitAiMode()" title="Return to Search Engine">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
              </svg>
            </button>
            <button onclick="searchAI()" class="ai-send-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div id="autocompleteDropdown" class="autocomplete-dropdown"></div>
      <input id="cameraInput" type="file" accept="image/*" hidden>
      <input id="pdfInput" type="file" accept="application/pdf" hidden>
      <p id="scanStatus" class="scan-status"></p>
    </div>

    <!-- ═══ SEARCH FILTERS ═══ -->
    <div id="searchFilters" class="filter-bar" style="display:none;">
      <button class="filter-pill active" data-filter="all" onclick="setFilter('all')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        All
      </button>
      <button class="filter-pill" data-filter="news" onclick="setFilter('news')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a4 4 0 0 1-4-4V6" />
          <path d="M18 14H10" />
          <path d="M15 18h-5" />
          <path d="M10 6h8v4h-8z" />
        </svg>
        News
      </button>
      <button class="filter-pill" data-filter="images" onclick="setFilter('images')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <circle cx="8.5" cy="8.5" r="1.5" />
          <polyline points="21 15 16 10 5 21" />
        </svg>
        Images
      </button>
      <button class="filter-pill" data-filter="videos" onclick="setFilter('videos')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polygon points="23 7 16 12 23 17 23 7" />
          <rect x="1" y="5" width="15" height="14" rx="2" />
        </svg>
        Videos
      </button>
      <button class="filter-pill" data-filter="weather" onclick="setFilter('weather')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M17.5 19a3.5 3.5 0 1 1 0-7c.1 0 .2 0 .3 0a5 5 0 1 1 9.2 2" />
          <path d="M12 18V22" />
          <path d="M8 22L12 18L16 22" />
        </svg>
        Weather
      </button>
      <button class="filter-pill" data-filter="score" onclick="setFilter('score')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10" />
          <path d="M12 8v8M8 12h8" />
        </svg>
        Live Score
      </button>
      <button class="filter-pill" data-filter="stock" onclick="setFilter('stock')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="3 17 9 11 13 15 21 7" />
          <polyline points="15 7 21 7 21 13" />
        </svg>
        Stock
      </button>
      <button class="filter-pill ai-tab" onclick="enterAiMode()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
        </svg>
        Ask AI
      </button>
    </div>

    <!-- ═══ HISTORY ═══ -->
    <div id="searchHistory" class="history-row"></div>

    <!-- ═══ TRENDING ═══ -->
    <div id="trendingContainer" class="trending-wrap">
      <h3 class="section-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
          <polyline points="17 6 23 6 23 12" />
        </svg>
        Trending in India
      </h3>
      <div class="trending-grid"></div>
    </div>

    <!-- ═══ AI SUMMARY ═══ -->
    <div id="aiSummary" class="ai-summary-wrap"></div>

    <!-- ═══ LIVE SCANNER VIEW ═══ -->
    <div id="liveScanner" class="live-scanner" style="display:none;">
      <div class="scanner-header">
        <span>📷 Live Scanner</span>
        <button onclick="stopLiveScan()" class="scanner-close">&times;</button>
      </div>
      <div class="scanner-video-wrap">
        <video id="scannerVideo" autoplay playsinline></video>
        <div class="scanner-guide"></div>
      </div>
      <p id="liveScanStatus">Align QR code within the frame</p>
      <div class="scanner-footer">
        <button onclick="openImagePicker(); stopLiveScan();" class="scanner-gallery-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21 15 16 10 5 21" />
          </svg>
          Upload from Gallery
        </button>
      </div>
    </div>

    <!-- ═══ RESULTS ═══ -->
    <div id="results" class="results-wrap"></div>

    <!-- ═══ PAGINATION ═══ -->
    <div id="pagination" class="pagination-wrap"></div>
  </main>

  <!-- ═══ DARK MODE TOGGLE (FIXED BOTTOM) ═══ -->
  <button class="theme-fab" id="themeFab" onclick="toggleMode()" title="Toggle Dark/Light Mode">
    <span class="fab-sun">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="12" cy="12" r="5" />
        <line x1="12" y1="1" x2="12" y2="3" />
        <line x1="12" y1="21" x2="12" y2="23" />
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
        <line x1="1" y1="12" x2="3" y2="12" />
        <line x1="21" y1="12" x2="23" y2="12" />
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
      </svg>
    </span>
    <span class="fab-moon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
      </svg>
    </span>
  </button>

  <!-- ═══ IMAGE MODAL ═══ -->
  <div id="imageModal" class="overlay-modal" style="display:none;" onclick="if(event.target===this)closeImageModal()">
    <div class="img-modal-inner">
      <div class="img-modal-bar">
        <button class="img-bar-btn" onclick="toggleDownloadMenu()" title="More options">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <circle cx="12" cy="5" r="1.5" />
            <circle cx="12" cy="12" r="1.5" />
            <circle cx="12" cy="19" r="1.5" />
          </svg>
        </button>
        <div id="downloadMenu" class="download-menu" style="display:none;">
          <a id="downloadBtn" class="download-item">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="7 10 12 15 17 10" />
              <line x1="12" y1="15" x2="12" y2="3" />
            </svg>
            Download Image
          </a>
        </div>
        <button class="img-bar-btn img-close-btn" onclick="closeImageModal()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <img id="zoomedImage" class="zoomed-img" src="" alt="Zoomed Image">
    </div>
  </div>

  <!-- ═══ AUTH MODAL ═══ -->
  <div id="authModal" class="overlay-modal" style="display:none;" onclick="if(event.target===this)closeAuthModal()">
    <div class="auth-card">
      <div class="auth-header">
        <h2 id="authTitle">Sign In</h2>
        <button class="close-btn" onclick="closeAuthModal()">&times;</button>
      </div>

      <div class="auth-tabs">
        <button id="emailTab" class="auth-tab active" onclick="setAuthMethod('email')">Email</button>
        <button id="phoneTab" class="auth-tab" onclick="setAuthMethod('phone')">Mobile</button>
      </div>

      <!-- Email Form -->
      <form id="emailForm" class="auth-form" onsubmit="handleAuthSubmit(event)">
        <input type="email" id="authEmail" placeholder="Email Address" required>
        <input type="password" id="authPassword" placeholder="Password" required>
        <button type="submit" id="authSubmitBtn" class="btn-primary">Continue</button>
      </form>

      <!-- Phone Form -->
      <form id="phoneForm" class="auth-form" style="display:none;" onsubmit="handlePhoneSubmit(event)">
        <div id="recaptcha-container"></div>
        <div class="phone-input-group">
          <span class="country-code">+91</span>
          <input type="tel" id="authPhone" placeholder="Mobile Number" pattern="[0-9]{10}">
        </div>
        <div id="otpGroup" style="display:none;">
          <input type="text" id="authOtp" placeholder="Enter 6-digit OTP">
        </div>
        <button type="submit" id="phoneSubmitBtn" class="btn-primary">Send OTP</button>
      </form>

      <div class="auth-footer">
        <p id="authSwitchText">Don't have an account? <a href="#" onclick="toggleAuthMode()">Sign Up</a></p>
      </div>
    </div>
  </div>

  <script src="app.js?v=smart-filters-3"></script>
</body>

</html>
