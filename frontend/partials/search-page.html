<!-- ═══ HERO (HOME STATE) ═══ -->
  <main class="main-wrap">
    <section class="hero" id="heroSection">
      <div class="hero-logo">
        <span class="hl-india">India</span><span class="hl-search">Search</span>
      </div>
    </section>

    <!-- ═══ SEARCH SHELL ═══ -->
    <div class="search-shell" id="searchShell">
      <!-- Standard Mode -->
      <div class="search-box" id="searchBoxStandard">
        <button class="s-icon" type="button" onclick="if(searchInput.value.trim()) search(1, false);" title="Search">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
        </button>
        <input id="searchInput" type="text" placeholder="search is here…" autocomplete="off" spellcheck="false" onfocus="enterSearchMode()" onblur="exitSearchMode()">
        <button id="clearSearchBtn" class="search-clear-btn" onclick="clearSearchInput()" title="Clear"
          style="display:none;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
        <div class="s-actions">
          <button onclick="toggleVoiceSearch()" id="micButton" class="icon-btn" title="Voice Search">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
              <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
              <line x1="12" y1="19" x2="12" y2="23" />
              <line x1="8" y1="23" x2="16" y2="23" />
            </svg>
          </button>
          <button onclick="startLiveScan()" id="cameraButtonStandard" class="icon-btn" title="Camera Search">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
              <circle cx="12" cy="13" r="4" />
            </svg>
          </button>

          <div class="s-divider"></div>
          <button id="askAiButton" onclick="enterAiMode()" class="btn-ai-toggle" title="Switch to AI Mode">
              <svg width="0" height="0" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="2.2">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
              </svg>
              Ask AI
            </button>
        </div>
      </div>

      <!-- AI Mode Box  -->
      <div class="ai-mode-box" id="searchBoxAi" style="display:none;">
        <div class="ai-glow-bg"></div>
        <div id="aiPdfPreview" class="ai-pdf-preview" style="display:none;"></div>
        <div class="ai-input-wrap">
          <textarea id="aiSearchInput" placeholder="Puchho jo aapke mann mein hai... (AI Mode)" rows="1"
            oninput="autoExpand(this)"></textarea>
          <div class="ai-actions">
            <button onclick="openPdfPicker()" class="ai-mini-btn" title="PDF Analysis">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
              </svg>
            </button>
            <button onclick="startLiveScan()" class="ai-mini-btn" title="Visual Recognition">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                <circle cx="12" cy="13" r="4" />
              </svg>
            </button>
            <button onclick="toggleVoiceSearch('ai')" class="ai-mini-btn" id="micButtonAi" title="Voice Search">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
                <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                <line x1="12" y1="19" x2="12" y2="23" />
                <line x1="8" y1="23" x2="16" y2="23" />
              </svg>
            </button>
            <button class="ai-mini-btn" onclick="exitAiMode()" title="Return to Search Engine">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
              </svg>
            </button>
            <button onclick="searchAI()" class="ai-send-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <div id="autocompleteDropdown" class="autocomplete-dropdown"></div>
      <input id="cameraInput" type="file" accept="image/*" hidden>
      <input id="pdfInput" type="file" accept="application/pdf" hidden>
      <p id="scanStatus" class="scan-status"></p>

    </div>

    <!-- ═══ SEARCH FILTERS ═══ -->
    <div id="searchFilters" class="filter-bar" style="display:none;">
      <button class="filter-pill" data-filter="advanced" onclick="setFilter('advanced')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polygon
            points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
        </svg>
        Advanced
      </button>
      <button class="filter-pill active" data-filter="all" onclick="setFilter('all')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        All
      </button>
      <button class="filter-pill" data-filter="news" onclick="setFilter('news')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a4 4 0 0 1-4-4V6" />
          <path d="M18 14H10" />
          <path d="M15 18h-5" />
          <path d="M10 6h8v4h-8z" />
        </svg>
        News
      </button>
      <button class="filter-pill" data-filter="images" onclick="setFilter('images')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <circle cx="8.5" cy="8.5" r="1.5" />
          <polyline points="21 15 16 10 5 21" />
        </svg>
        Images
      </button>
      <button class="filter-pill" data-filter="videos" onclick="setFilter('videos')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polygon points="23 7 16 12 23 17 23 7" />
          <rect x="1" y="5" width="15" height="14" rx="2" />
        </svg>
        Videos
      </button>
      <button class="filter-pill" data-filter="weather" onclick="setFilter('weather')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M17.5 19a3.5 3.5 0 1 1 0-7c.1 0 .2 0 .3 0a5 5 0 1 1 9.2 2" />
          <path d="M12 18V22" />
          <path d="M8 22L12 18L16 22" />
        </svg>
        Weather
      </button>
      <button class="filter-pill" data-filter="score" onclick="setFilter('score')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10" />
          <path d="M12 8v8M8 12h8" />
        </svg>
        Live Score
      </button>
      <button class="filter-pill" data-filter="stock" onclick="setFilter('stock')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="3 17 9 11 13 15 21 7" />
          <polyline points="15 7 21 7 21 13" />
        </svg>
        Stock
      </button>
      <button class="filter-pill" data-filter="sarkari" onclick="setFilter('sarkari')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        Sarkari
      </button>
      <button class="filter-pill" data-filter="jobs" onclick="setFilter('jobs')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
          <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
        </svg>
        Jobs
      </button>
      <button class="filter-pill" data-filter="mandi" onclick="setFilter('mandi')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
        </svg>
        Mandi
      </button>
      <button class="filter-pill" data-filter="irctc" onclick="setFilter('irctc')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <rect x="4" y="3" width="16" height="16" rx="2" ry="2"></rect>
          <path d="M4 11h16M12 3v8M8 19l-2 3M16 19l2 3"></path>
        </svg>
        IRCTC
      </button>
      <button class="filter-pill" data-filter="aadhaar" onclick="setFilter('aadhaar')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
        Aadhaar/PAN
      </button>
      <button class="filter-pill" data-filter="jugaad" onclick="setFilter('jugaad')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path
            d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z">
          </path>
        </svg>
        Jugaad
      </button>
      <button class="filter-pill" data-filter="courts" onclick="setFilter('courts')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="8" r="7"></circle>
          <polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline>
        </svg>
        Courts
      </button>
      <button class="filter-pill" data-filter="nutrition" onclick="setFilter('nutrition')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path
            d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z">
          </path>
        </svg>
        Nutrition
      </button>
      <button class="filter-pill ai-tab" onclick="enterAiMode()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
        </svg>
        Ask AI
      </button>
    </div>

    <!-- ═══ HISTORY ═══ -->
    <div id="searchHistory" class="history-row"></div>

    <!-- ═══ AI SUMMARY ═══ -->
    <div id="aiSummary" class="ai-summary-wrap"></div>

    <!-- ═══ LIVE SCANNER VIEW ═══ -->
    <div id="liveScanner" class="live-scanner" style="display:none;">
      <div class="scanner-header">
        <span>📷 Live Scanner</span>
        <button onclick="stopLiveScan()" class="scanner-close">&times;</button>
      </div>
      <div class="scanner-video-wrap">
        <video id="scannerVideo" autoplay playsinline></video>
        <div class="scanner-guide"></div>
      </div>
      <p id="liveScanStatus">Align QR code or Food Item within the frame</p>
      <div class="scanner-footer">
        <button onclick="captureLiveNutritionFrame()" id="nutritionCaptureBtn" class="scanner-gallery-btn"
          style="display:none;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="10" />
            <path d="M12 8v8M8 12h8" />
          </svg>
          Analyze Food
        </button>
        <button onclick="openImagePicker(); stopLiveScan();" class="scanner-gallery-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <rect x="3" y="3" width="18" height="18" rx="2" />
            <circle cx="8.5" cy="8.5" r="1.5" />
            <polyline points="21 15 16 10 5 21" />
          </svg>
          Upload from Gallery
        </button>
      </div>
    </div>

    <!-- ═══ RESULTS ═══ -->
    <div id="results" class="results-wrap"></div>

    <!-- ═══ PAGINATION ═══ -->
    <div id="pagination" class="pagination-wrap"></div>
  </main>
